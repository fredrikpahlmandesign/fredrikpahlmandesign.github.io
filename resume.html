<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Fredrik Påhlman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F0;
      --bg-alt: #EDEAE3;
      --ink: #1A1814;
      --ink-mid: #6B6760;
      --ink-light: #B0ADA7;
      --accent: #C8562A;
      --serif: 'Fraunces', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
      --pad: clamp(1.5rem, 5vw, 4rem);
      --max: 860px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem var(--pad);
      background: var(--bg);
      border-bottom: 1px solid var(--bg-alt);
    }
    .nav-logo {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 1rem;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--ink); }
    .nav-links a.active { color: var(--ink); }

    .resume-wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 8rem var(--pad) 6rem;
    }

    /* Variant banner */
    .variant-banner {
      display: none;
      background: var(--bg-alt);
      border: 1px solid var(--ink-light);
      border-radius: 4px;
      padding: 0.7rem 1.1rem;
      font-size: 0.8125rem;
      color: var(--ink-mid);
      margin-bottom: 2.5rem;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .variant-banner.visible { display: flex; }
    .variant-badge {
      font-weight: 500;
      font-size: 0.75rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
    }
    .variant-link {
      font-size: 0.75rem;
      color: var(--ink-mid);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--ink-light);
    }
    .variant-link:hover { text-decoration-color: var(--accent); color: var(--ink); }

    /* Header */
    .resume-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--ink);
      margin-bottom: 3.5rem;
    }
    @media (max-width: 600px) { .resume-head { grid-template-columns: 1fr; } }
    .resume-head-name {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(2.25rem, 6vw, 4rem);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .resume-head-title {
      font-size: 1rem;
      color: var(--ink-mid);
      margin-top: 0.5rem;
    }
    .resume-head-contact {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    @media (max-width: 600px) { .resume-head-contact { text-align: left; } }
    .resume-head-contact a,
    .resume-head-contact span {
      font-size: 0.875rem;
      color: var(--ink-mid);
      text-decoration: none;
      display: block;
      line-height: 1.5;
    }
    .resume-head-contact a:hover { color: var(--accent); }

    /* Section */
    .resume-section {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 0 3rem;
      margin-bottom: 3rem;
    }
    @media (max-width: 640px) {
      .resume-section { grid-template-columns: 1fr; gap: 1rem; }
    }
    .resume-section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      padding-top: 0.25rem;
    }
    .resume-entries { display: flex; flex-direction: column; gap: 0; }

    /* Entry */
    .resume-entry {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--bg-alt);
    }
    .resume-entry:first-child { padding-top: 0; }
    .resume-entry-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1.5rem;
      margin-bottom: 0.25rem;
    }
    .resume-entry-role { font-weight: 500; font-size: 0.9375rem; }
    .resume-entry-period {
      font-size: 0.8125rem;
      color: var(--ink-light);
      white-space: nowrap;
    }
    .resume-entry-company {
      font-size: 0.875rem;
      color: var(--ink-mid);
      margin-bottom: 0.6rem;
    }
    .resume-entry-desc {
      font-size: 0.9375rem;
      color: var(--ink-mid);
      line-height: 1.65;
    }

    /* Skills */
    .skills-grid { display: flex; flex-direction: column; gap: 1rem; }
    .skills-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .skill-tag {
      display: inline-block;
      padding: 0.3rem 0.75rem;
      background: var(--bg-alt);
      border-radius: 100px;
      font-size: 0.8125rem;
      color: var(--ink-mid);
    }
    .skill-tag.highlight {
      background: var(--ink);
      color: var(--bg);
    }

    /* Download */
    .resume-download {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      border: 1.5px solid var(--ink);
      padding: 0.6rem 1.25rem;
      border-radius: 3px;
      margin-top: 3rem;
      transition: background 0.2s, color 0.2s;
    }
    .resume-download:hover { background: var(--ink); color: var(--bg); }
    .resume-download:active { transform: scale(0.98); }

    /* ── PRINT ── */
    @media print {
      nav, footer, .resume-download, .variant-banner { display: none !important; }
      body { background: #fff; font-size: 11pt; }
      .resume-wrap {
        padding: 1.5cm 1.8cm;
        max-width: none;
      }
      .resume-head {
        padding-bottom: 1.25rem;
        margin-bottom: 2rem;
      }
      .resume-head-name { font-size: 2.25rem; }
      .resume-section { margin-bottom: 1.75rem; }
      .resume-entry { padding: 1rem 0; }
      .resume-entry-desc { font-size: 0.875rem; }
      a { color: inherit; text-decoration: none; }
    }

    footer {
      padding: 3rem var(--pad);
      border-top: 1px solid var(--bg-alt);
      margin-top: 2rem;
    }
    .footer-inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .footer-name {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 300;
      color: var(--ink-mid);
    }
    .footer-links { display: flex; gap: 1.75rem; list-style: none; }
    .footer-links a {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--ink); }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Fredrik Påhlman</a>
    <ul class="nav-links">
      <li><a href="index.html#work">Work</a></li>
      <li><a href="index.html#personal">Personal</a></li>
      <li><a href="writing.html">Writing</a></li>
      <li><a href="resume.html" class="active">Resume</a></li>
      <li><a href="mailto:fredrikande@gmail.com">Contact</a></li>
    </ul>
  </nav>

  <div class="resume-wrap">

    <!-- Variant indicator (shown only when ?for= param is present) -->
    <div class="variant-banner" id="variant-banner">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <span class="variant-badge" id="variant-badge"></span>
        <span id="variant-label"></span>
      </div>
      <a href="resume.html" class="variant-link">View general version →</a>
    </div>

    <!-- Header — populated by JS -->
    <div class="resume-head" id="resume-head"></div>

    <!-- Experience — populated by JS -->
    <div class="resume-section" id="section-experience">
      <div class="resume-section-label">Experience</div>
      <div class="resume-entries" id="entries-experience"></div>
    </div>

    <!-- Education — populated by JS -->
    <div class="resume-section" id="section-education">
      <div class="resume-section-label">Education</div>
      <div class="resume-entries" id="entries-education"></div>
    </div>

    <!-- Skills — populated by JS -->
    <div class="resume-section" id="section-skills">
      <div class="resume-section-label">Skills</div>
      <div class="skills-grid" id="skills-grid"></div>
    </div>

    <button onclick="window.print()" class="resume-download" id="download-link">↓ Download as PDF</button>

  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-name">Fredrik Påhlman — Design &amp; Product</span>
      <ul class="footer-links">
        <li><a href="https://www.linkedin.com/in/fredrik-p%C3%A5hlman-9219ba21" target="_blank">LinkedIn</a></li>
        <li><a href="mailto:fredrikande@gmail.com">Email</a></li>
      </ul>
    </div>
  </footer>

  <script>
  // ── Resume variants ──────────────────────────────────────────────────────
  //
  // URLs use random tokens instead of company names so recipients can't
  // guess other variants by changing the URL.
  //
  // To add a new variant:
  //   1. Generate a token (e.g. in terminal: openssl rand -base64 6)
  //   2. Add it as a key below with a 'label' (internal only, never shown publicly)
  //   3. Share: yoursite/resume.html?t=TOKEN
  //
  // Token map (keep this private):
  //   default   → yoursite/resume.html              (general)
  //   3JrSaua2  → yoursite/resume.html?t=3JrSaua2   (slot for first tailored variant)
  //   R8KuS_zP  → yoursite/resume.html?t=R8KuS_zP   (slot for second tailored variant)
  //
  const VARIANTS = {

    default: {
      label: null,
      headTitle: "Product & Design Leader · Discovery · Strategy · Transformation",
      experience: [
        {
          role: "UX & Discovery Lead · Senior Product Designer",
          period: "2024 – Present",
          company: "Sleep Cycle · Gothenburg",
          desc: "Discovery lead across four product teams in a 40-person company. Built a continuous discovery practice from scratch, including an unbroken weekly user interview cadence sustained for 18 months. Introduced AI-assisted synthesis workflows and a JTBD-based insight system in Notion, connecting research to product decisions across design, product, and engineering."
        },
        {
          role: "Head of Product · VP of UX · UX Designer",
          period: "2020 – 2024",
          company: "CarbonCloud · Gothenburg · Climate tech B2B SaaS",
          desc: "Joined as the first design hire at 10 people and grew with the company to 45, progressing from UX Designer to Head of Product. Took full ownership of product strategy, roadmap, and a product team of three. Shifted the org from feature delivery to outcome-oriented development, working closely with founders and GTM leadership throughout rapid commercial scaling."
        },
        {
          role: "Chief Design Officer · UX Director · Interaction Designer",
          period: "2012 – 2020",
          company: "inUse · Gothenburg · Design & innovation consultancy",
          desc: "Eight years growing from practitioner to CDO, leading a 120-person design organisation across five Design Directors. Drove design maturity, capability building, and strategic repositioning. Senior project work included AstraZeneca and, early in the career, Volvo Cars as a first role straight out of Chalmers."
        }
      ],
      education: [
        {
          role: "M.Sc. Industrial Design Engineering",
          period: "2005 – 2010",
          company: "Chalmers University of Technology · Minor in Cognitive Ergonomics",
          desc: null
        }
      ],
      skills: [
        {
          label: "Discovery & Design",
          tags: ["Product Discovery", "Design Leadership", "UX Strategy", "Interaction Design", "Prototyping", "Service Design"],
          highlight: []
        },
        {
          label: "Tools",
          tags: ["Figma", "Dovetail", "Notion", "Miro", "Claude / ChatGPT"],
          highlight: []
        },
        {
          label: "Product & Leadership",
          tags: ["Continuous Discovery", "Product Strategy", "Outcome-based Roadmaps", "Cross-functional Alignment", "Org Transformation", "AI-enabled Workflows"],
          highlight: []
        }
      ]
    },

    // ── Add tailored variants below ──────────────────────────────────────
    // Keys are random tokens, not company names.
    // Share as: resume.html?t=TOKEN
    //
    // "3JrSaua2": {
    //   label: "Volvo Group",   ← internal label only, never shown publicly
    //   headTitle: "Design & Product Leader · Enterprise · Org Transformation",
    //   experience: [ ... ],
    //   education: [ ... ],
    //   skills: [ ... ]
    // },

  };

  // ── Rendering ─────────────────────────────────────────────────────────────
  function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    Object.entries(attrs || {}).forEach(([k, v]) => {
      if (k === 'class') e.className = v;
      else if (k === 'innerHTML') e.innerHTML = v;
      else e.setAttribute(k, v);
    });
    children.forEach(c => c && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
    return e;
  }

  function renderHead(v) {
    const head = document.getElementById('resume-head');
    head.innerHTML = `
      <div>
        <h1 class="resume-head-name">Fredrik<br>Påhlman</h1>
        <p class="resume-head-title">${v.headTitle}</p>
      </div>
      <div class="resume-head-contact">
        <a href="mailto:fredrikande@gmail.com">fredrikande@gmail.com</a>
        <span>+46 704 277 684</span>
        <a href="https://www.linkedin.com/in/fredrik-p%C3%A5hlman-9219ba21" target="_blank">LinkedIn</a>
        <a href="index.html">Portfolio</a>
        <span>Mölndal, Sweden</span>
      </div>`;
  }

  function renderEntries(containerId, entries) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    entries.forEach(e => {
      const div = document.createElement('div');
      div.className = 'resume-entry';
      div.innerHTML = `
        <div class="resume-entry-head">
          <span class="resume-entry-role">${e.role}</span>
          <span class="resume-entry-period">${e.period}</span>
        </div>
        <div class="resume-entry-company">${e.company}</div>
        ${e.desc ? `<div class="resume-entry-desc">${e.desc}</div>` : ''}
      `;
      container.appendChild(div);
    });
  }

  function renderSkills(v) {
    const grid = document.getElementById('skills-grid');
    grid.innerHTML = '';
    v.skills.forEach(group => {
      const groupDiv = document.createElement('div');
      groupDiv.innerHTML = `<div style="font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:0.6rem;">${group.label}</div>`;
      const row = document.createElement('div');
      row.className = 'skills-row';
      group.tags.forEach(tag => {
        const span = document.createElement('span');
        span.className = 'skill-tag' + (group.highlight.includes(tag) ? ' highlight' : '');
        span.textContent = tag;
        row.appendChild(span);
      });
      groupDiv.appendChild(row);
      grid.appendChild(groupDiv);
    });
  }

  function init() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('t') || 'default';
    const variant = VARIANTS[token] || VARIANTS.default;
    const isVariant = token !== 'default' && VARIANTS[token];

    // Update page title — use label, never the token
    if (isVariant && variant.label) {
      document.title = `Resume — Fredrik Påhlman`;
    }

    // Show variant banner (you see it; recipient just sees the resume)
    if (isVariant) {
      const banner = document.getElementById('variant-banner');
      banner.classList.add('visible');
      document.getElementById('variant-badge').textContent = variant.label || 'Variant';
      document.getElementById('variant-label').textContent = 'Tailored version — only you see this banner';
    }

    renderHead(variant);
    renderEntries('entries-experience', variant.experience);
    renderEntries('entries-education', variant.education);
    renderSkills(variant);
  }

  init();
  </script>

</body>
</html>
